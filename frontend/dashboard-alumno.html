<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Escolar - Panel Alumno</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <div class="custom-cursor-follower"></div>

    <!-- Panel ALUMNO -->
    <section id="studentDashboard" class="view">
      <header class="topbar">
        <div class="brand">
          <img src="assets/logo.png" alt="SAGE Logo" class="logo-topbar" />
          Alumno
        </div>
        <nav class="menu">
          <button class="link" data-student="home">Inicio</button>
          <button class="link" data-student="academics">Académico</button>
          <button class="link" data-student="schedule">Horario</button>
        </nav>
        <label class="switch">
          <input type="checkbox" data-theme-toggle>
          <span class="slider"></span>
        </label>
        <button id="logoutStudent" class="btn">Cerrar sesión</button>
      </header>

      <main class="content">
        <!-- Student Home -->
        <section id="student-home" class="panel">
          <h2>Bienvenido, Alumno</h2>
          <div class="stats-grid">
            <div class="stat">
              <div class="value" id="studentClassCount">0</div>
              <div class="label">Clases Inscritas</div>
            </div>
            <div class="stat">
              <div class="value" id="studentGPA">0.0</div>
              <div class="label">Promedio General</div>
            </div>
            <div class="stat">
              <div class="value" id="studentAttendance">0%</div>
              <div class="label">Asistencia</div>
            </div>
          </div>
        </section>

        <!-- Student Academics -->
        <section id="student-academics" class="panel" hidden>
          <div class="panel-header">
            <h2>Mis Calificaciones</h2>
          </div>
          <div class="panel-body">
            <table class="table">
              <thead>
                <tr>
                  <th>Clase</th>
                  <th>Profesor</th>
                  <th>Evaluación</th>
                  <th>Calificación</th>
                </tr>
              </thead>
              <tbody id="studentGradesTable"></tbody>
            </table>
          </div>
        </section>

        <!-- Student Schedule -->
        <section id="student-schedule" class="panel" hidden>
          <div class="panel-header">
            <h2>Mi Horario</h2>
          </div>
          <div class="panel-body">
            <table class="table">
              <thead>
                <tr>
                  <th>Clase</th>
                  <th>Profesor</th>
                  <th>Día</th>
                  <th>Hora</th>
                  <th>Salón</th>
                </tr>
              </thead>
              <tbody id="scheduleTable"></tbody>
            </table>
          </div>
        </section>
      </main>
    </section>

    <script src="js/app.js?v=20260510"></script>
    <script>
      // Custom Cursor Logic
      const cursor = document.querySelector('.custom-cursor');
      const follower = document.querySelector('.custom-cursor-follower');
      
      let mouseX = 0, mouseY = 0;
      let followerX = 0, followerY = 0;
      
      document.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        
        cursor.style.left = mouseX + 'px';
        cursor.style.top = mouseY + 'px';
      });
      
      function animate() {
        followerX += (mouseX - followerX) * 0.12;
        followerY += (mouseY - followerY) * 0.12;
        
        follower.style.left = followerX + 'px';
        follower.style.top = followerY + 'px';
        
        requestAnimationFrame(animate);
      }
      animate();

      const observer = new MutationObserver(() => {
        const interactives = document.querySelectorAll('button, a, input, select, textarea, [role="button"], summary');
        interactives.forEach(el => {
          if (el.dataset.cursorBound) return;
          el.dataset.cursorBound = "true";
          el.addEventListener('mouseenter', () => {
            cursor.classList.add('hover');
            follower.classList.add('hover');
          });
          el.addEventListener('mouseleave', () => {
            cursor.classList.remove('hover');
            follower.classList.remove('hover');
          });
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });
    </script>
  </body>
</html>
