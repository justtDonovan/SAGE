<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema Escolar - Login Administrador</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <div class="custom-cursor-follower"></div>

    <!-- Login -->
    <section id="login" class="view">
      <div class="login-card admin-login">
        <img src="assets/logo.png" alt="SAGE Logo" class="logo-login" />
        <h1>Administrador</h1>
        <p class="login-subtitle">Sistema de Gestión Escolar</p>

        <form id="loginForm">
          <label for="username">Usuario</label>
          <input
            type="text"
            id="username"
            placeholder="ADMINISTRADOR"
            required
          />
          <label for="password">Contraseña</label>
          <div class="password-field">
            <input type="password" id="password" placeholder="********" required />
            <button type="button" id="toggleLoginPassword" class="toggle-password" aria-label="Mostrar contraseña">👁</button>
          </div>
          <button type="submit" id="loginBtn" class="button">
            Ingresar
          </button>
          <div id="loginError" class="error" hidden></div>
        </form>

        <div class="login-footer">
          <a href="index.html" class="button-link">← Volver a seleccionar rol</a>
        </div>
      </div>
    </section>

    <script src="js/app-common.js"></script>
    <script src="js/auth-utils.js"></script>
    <script src="js/login-admin.js"></script>
  </body>
</html>
